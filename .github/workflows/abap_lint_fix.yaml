name: ABAPLint Auto-Fix
on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx abaplint --fix
      - uses: peter-evans/create-pull-request@v8
        with:
          title: 'chore: abaplint auto-fix'
          branch: abaplint/auto-fix
