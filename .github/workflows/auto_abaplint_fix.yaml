name: auto_abaplint_fix

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'   # Every Monday at midnight

permissions:
  contents: read

jobs:
  auto_abaplint_fix:
    if: github.repository == 'kartefact/zdbuf'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          # Required for create-pull-request to work properly
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run abaplint auto-fix
        run: npm run auto_abaplint

      - name: Create Pull Request with fixes
        uses: peter-evans/create-pull-request@v8
        with:
          title: 'chore: abaplint auto-fixes'
          body: |
            Automated abaplint fixes (formatting, quick fixes, etc.).
            
            This PR was created automatically by the weekly scheduled workflow.
          branch: abaplint-auto-fixes
          delete-branch: true
          commit-message: 'chore: abaplint auto-fixes'
