name: Combine into Single Program

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allows manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  combine:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install abapmerge
        run: npm install -g abapmerge

      - name: Combine into single standalone program
        run: |
          mkdir -p combined

          abapmerge \
            --main src/02/zdbuf_upload.prog.abap \
            --output combined/zdbuf_standalone.prog.abap \
            --pretty

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update/standalone-program
          title: 'chore: update zdbuf_standalone.prog.abap (auto-generated)'
          body: |
            Automated update of the standalone combined program using `abapmerge`.

            This PR was created automatically after changes to `main`.
          commit-message: 'chore: update standalone program (auto-generated)'
          delete-branch: true
          base: combined