name: Combine into Single Program

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  combine:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install abapmerge
        run: npm install -g abapmerge

      - name: Combine into single standalone program
        run: |
          mkdir -p combined
          # Build a flat staging dir: main prog + all class/intf files from src/01/
          STAGE=$(mktemp -d)
          cp src/02/zdbuf_upload.prog.abap "$STAGE/"
          cp src/01/*.clas.abap "$STAGE/" 2>/dev/null || true
          cp src/01/*.intf.abap "$STAGE/" 2>/dev/null || true
          abapmerge \
            -f "$STAGE/zdbuf_upload.prog.abap" \
            -c zdbuf_standalone \
            -o combined/zdbuf_standalone.prog.abap
          rm -rf "$STAGE"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update standalone program'
          branch: update/standalone-program
          base: main
          title: 'chore: update standalone program'
          body: 'Automated update of standalone combined program.'
