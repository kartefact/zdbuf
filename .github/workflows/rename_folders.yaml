name: rename_folders
# ONE-TIME: Run manually to move src/01_core->src/01, src/02_ui->src/02, remove src/00_deps
# Delete this file after successful run.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename_folders:
    if: github.repository == 'kartefact/zdbuf'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Move source folders
      run: |
        set -e
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"

        # 1. Remove only the conflicting stub files, not whole dirs
        git rm src/01/package.devc.xml || true
        git rm src/02/package.devc.xml || true

        # 2. Ensure target dirs exist
        mkdir -p src/01 src/02

        # 3. Move contents of core/ui into numbered dirs
        git mv src/01_core/* src/01/
        rmdir src/01_core || true

        git mv src/02_ui/* src/02/
        rmdir src/02_ui || true

        # 4. Remove old 00_deps (replaced by src/00)
        git rm -r src/00_deps || true

        git status
        git commit -m "refactor: rename src/01_core->src/01, src/02_ui->src/02, remove src/00_deps"
        git push
