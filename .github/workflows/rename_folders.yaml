name: rename_folders
# ONE-TIME: Run manually to move src/01_core->src/01, src/02_ui->src/02, remove src/00_deps
# Delete this file after successful run.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename_folders:
    if: github.repository == 'kartefact/zdbuf'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Move source folders
      run: |
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"

        # Remove existing target stubs so git mv has clean destinations
        rm -rf src/01 src/02

        # Move entire directories
        git mv src/01_core src/01
        git mv src/02_ui src/02

        # Remove old 00_deps (replaced by src/00)
        git rm -r src/00_deps

        git status
        git commit -m "refactor: rename src/01_core->src/01, src/02_ui->src/02, remove src/00_deps"
        git push
